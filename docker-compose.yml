
services:
  wireguard:
    build:
      context: .
      dockerfile: Dockerfile.wireguard
    container_name: wireguard
    restart: unless-stopped
    privileged: true  # Required for WireGuard to create network interfaces
    cap_add:
      - NET_ADMIN      # Required for network interface management
      - SYS_MODULE     # Required for kernel module operations
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - /lib/modules:/lib/modules
    ports:
      # WireGuard VPN port (UDP)
      - "51820:51820/udp"
      # API port (exposed through WireGuard container's network)
      - "${API_PORT:-5000}:5000/tcp"
      # Note: TCP Proxy ports (3000-9999, 10000-19999, 20000-29999) are handled
      # by the TCP proxy service running in wireguard-api container.
      # Coolify will need to expose these ports individually or via port management.
      # The proxy service listens on all allocated ports inside the container.
    env_file:
      - .env  # Loads WIREGUARD_PRIVATE_KEY
    environment:
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - TZ=${TZ:-UTC}
    labels:
      # Tell Coolify to use this container
      - "coolify.managed=true"
      - "coolify.name=wireguard-vpn"
      - "coolify.http.port=5000"
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wireguard-net

  wireguard-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: wireguard-api
    restart: unless-stopped
    network_mode: "service:wireguard"  # Share WireGuard container's network namespace
    cap_add:
      - NET_ADMIN  # Required to run 'wg set' commands to modify WireGuard interface
    depends_on:
      - wireguard
    environment:
      # MongoDB connection string (REQUIRED - use external MongoDB or set MONGO_URI)
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/wireguard}
      # Server endpoint for client configs
      - SERVER_ENDPOINT=${SERVER_ENDPOINT:-YOUR_SERVER_IP:51820}
      # Node environment
      - NODE_ENV=${NODE_ENV:-production}
      # API port (internal, shared with WireGuard container)
      - PORT=5000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  wireguard-net:
    driver: bridge
